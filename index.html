<!DOCTYPE html>
<html lang="ko">
<head>
    <title>STATION v12 — 실동작 보드</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --border: #334155; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        body.theme-light { --bg: #e2e8f0; --panel: #f1f5f9; --text: #0f172a; --border: #94a3b8; }
        body.theme-light .obj { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        body.theme-light #board { background-color: #cbd5e1; }

        #login-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.92); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 0 24px rgba(56, 189, 248, 0.25); max-width: 90vw; }
        .login-box input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; width: 220px; text-align: center; background: var(--bg); color: var(--text); }

        #sidebar { width: 300px; min-width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 14px; }
        .tool-group { background: rgba(15, 23, 42, 0.35); border-radius: 10px; padding: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        body.theme-light .tool-group { background: rgba(255,255,255,0.6); }
        .tool-group strong { font-size: 13px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { padding: 8px; border: none; border-radius: 6px; cursor: pointer; background: #334155; color: white; font-size: 11px; font-weight: 600; transition: background 0.15s, transform 0.1s; }
        button:hover { filter: brightness(1.08); }
        button:active { transform: scale(0.98); }
        button.active { background: var(--accent); color: #0f172a; }

        #viewport { flex-grow: 1; position: relative; overflow: hidden; background: var(--bg); }
        #board { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 40px 40px; transition: opacity 0.2s; }
        #board.grid-off { background-image: none; background-color: #0f172a; }
        body.theme-light #board.grid-off { background-color: #e2e8f0; }
        #canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

        .obj { position: absolute; padding: 10px; border-radius: 10px; box-shadow: 0 12px 28px rgba(0,0,0,0.35); cursor: move; z-index: 10; background: #fef08a; color: #1c1917; min-width: 160px; max-width: 320px; font-size: 12px; }
        .obj textarea, .obj input[type="text"], .obj input[type="number"], .obj input[type="url"] { width: 100%; box-sizing: border-box; font-size: 12px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.15); padding: 6px; }
        .obj textarea { min-height: 72px; resize: vertical; font-family: inherit; }
        .obj pre, .obj code { font-family: ui-monospace, monospace; font-size: 11px; }
        .obj-type { font-weight: 700; color: #0f172a; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
        .obj .row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .obj .row button { flex: 1; min-width: 56px; }
        .poll-box { background: #fff !important; border: 2px solid var(--accent); }
        .obj-obj-code { background: #1e1e1e; color: #d4d4d4; }
        .obj-obj-code .obj-type { color: #9cdcfe; }
        .obj-obj-code textarea { background: #2d2d2d; color: #d4d4d4; border-color: #444; }
        .obj-obj-notice { background: #fecaca; border: 2px solid #ef4444; }
        .obj-obj-link { background: #dbeafe; }
        .obj-obj-youtube iframe { width: 100%; max-width: 280px; height: 158px; border: none; border-radius: 8px; margin-top: 6px; }

        #chat-panel { width: 300px; min-width: 260px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #chat-msgs { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .msg { background: #334155; padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; word-break: break-word; }
        .msg b { color: var(--accent); font-size: 11px; display: block; margin-bottom: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; }
        #chat-input-area { padding: 12px; border-top: 1px solid var(--border); }
        #presence-badge { font-size: 11px; color: var(--accent); text-align: center; padding: 4px; }

        #trash-bin {
            position: fixed; z-index: 500; right: 312px; bottom: 20px; width: 56px; height: 56px;
            border-radius: 14px; background: var(--panel); border: 2px dashed var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            pointer-events: none; opacity: 0.85; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            user-select: none;
        }
        #trash-bin.trash-hover { border-color: #ef4444; transform: scale(1.08); box-shadow: 0 0 0 3px rgba(239,68,68,0.35); opacity: 1; }
        .obj.obj-dragging { opacity: 0.92; z-index: 200; cursor: grabbing; }
        #lineWidthLabel { font-size: 10px; color: var(--accent); margin-top: 4px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3>아지트 입장 닉네임</h3>
        <input type="text" id="nickname-input" placeholder="이름을 입력하세요" autocomplete="username">
        <br>
        <button type="button" onclick="enterStation()" style="width:100%; padding:10px; background:var(--accent); color:#0f172a;">입장하기</button>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-scroll">
        <h2 style="color:var(--accent); text-align:center; margin:0;">STATION v12</h2>
        <div id="presence-badge">접속: —</div>
        <div class="tool-group">
            <strong>🖌️ 그리기 · 오브젝트는 보드 아래 🗑️에 놓으면 삭제</strong>
            <div class="grid-2">
                <button type="button" onclick="setTool('pen')" id="btn-pen" class="active">✏️ 펜</button>
                <button type="button" onclick="setTool('brush')" id="btn-brush">🖌️ 붓</button>
                <button type="button" onclick="setTool('marker')" id="btn-marker">🖍️ 마커</button>
                <button type="button" onclick="setTool('eraser')" id="btn-eraser">🧹 지우개(부분)</button>
                <button type="button" onclick="setTool('move')" id="btn-move">🖱️ 이동</button>
                <button type="button" onclick="undoStroke()">↩️ 한 획 되돌리기</button>
                <button type="button" onclick="createObj('note')">📋 포스트잇</button>
                <button type="button" onclick="createObj('text')">🔤 텍스트</button>
                <button type="button" onclick="toggleGrid()">🏁 격자</button>
                <button type="button" onclick="saveBoard()">💾 화면 저장</button>
            </div>
            <label id="lineWidthLabel" for="lineWidth">선 두께: <span id="lineWidthVal">6</span>px</label>
            <input type="range" id="lineWidth" min="2" max="48" value="6" style="width:100%;">
            <input type="color" id="colorPicker" value="#38bdf8" style="width:100%; height:32px; border-radius:6px; border:1px solid var(--border); cursor:pointer; margin-top:6px;">
            <small style="opacity:.85;font-size:10px;">지우개: 캔버스만 지움 · <kbd>Ctrl+Z</kbd> = 방금 그린 한 획 통째로 (입력칸에선 무시)</small>
        </div>

        <div class="tool-group">
            <strong>📝 Collaboration (9-16)</strong>
            <div class="grid-2">
                <button type="button" onclick="createObj('code')">9. 💻 코드박스</button>
                <button type="button" onclick="createObj('table')">10. 📊 실시간 표</button>
                <button type="button" onclick="createObj('todo')">11. ✅ 할일목록</button>
                <button type="button" onclick="createObj('link')">12. 🔗 링크공유</button>
                <button type="button" onclick="createObj('notice')">13. 📢 공지사항</button>
                <button type="button" onclick="createObj('mindmap')">14. 🧠 마인드맵</button>
                <button type="button" onclick="createObj('calendar')">15. 📅 캘린더</button>
                <button type="button" onclick="createObj('kanban')">16. 📋 칸반보드</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🎮 Game (17-24)</strong>
            <div id="shiri-val" style="font-size:11px; color:var(--accent);">현재: 없음</div>
            <input type="text" id="wordIn" placeholder="17. 끝말잇기 (엔터)" style="width:100%; padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); box-sizing:border-box;">
            <div class="grid-2">
                <button type="button" onclick="createObj('poll')">18. 🗳️ 투표 시작</button>
                <button type="button" onclick="createObj('rsp')">19. ✌️ 가위바위보</button>
                <button type="button" onclick="createObj('dice')">20. 🎲 주사위</button>
                <button type="button" onclick="createObj('name')">21. 👤 이름추첨</button>
                <button type="button" onclick="createObj('coin')">22. 🪙 동전던지기</button>
                <button type="button" onclick="createObj('ladder')">23. 🪜 사다리타기</button>
                <button type="button" onclick="createObj('bomb')">24. 💣 폭탄돌리기</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🚀 Utility (25-32)</strong>
            <div class="grid-2">
                <button type="button" onclick="createObj('timer')">25. ⏳ 타이머</button>
                <button type="button" onclick="createObj('clock')">26. ⏰ 세계시각</button>
                <button type="button" onclick="createObj('calc')">27. 🧮 계산기</button>
                <button type="button" onclick="createObj('weather')">28. ☁️ 날씨정보</button>
                <button type="button" onclick="createObj('palette')">29. 🎨 색상표</button>
                <button type="button" onclick="createObj('trans')">30. 🌐 번역기</button>
                <button type="button" onclick="createObj('qr')">31. 📱 QR생성</button>
                <button type="button" onclick="createObj('search')">32. 🔍 검색창</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>⚙️ System (33-40)</strong>
            <div class="grid-2">
                <button type="button" onclick="document.getElementById('chatFile').click()">33. 📁 파일 전송</button>
                <button type="button" onclick="createObj('youtube')">34. 📺 유튜브</button>
                <button type="button" onclick="createObj('music')">35. 🎵 배경음악</button>
                <button type="button" onclick="showPresenceCount()">36. 👥 접속자수</button>
                <button type="button" onclick="location.reload()">37. 🔄 새로고침</button>
                <button type="button" onclick="createObj('feedback')">38. 💬 피드백</button>
                <button type="button" onclick="toggleTheme()">39. 🌙 테마변경</button>
                <button type="button" onclick="resetAll()" style="background:#b91c1c;">40. 💣 전체초기화</button>
            </div>
        </div>
    </div>
</div>

<div id="viewport">
    <div id="board"><canvas id="canvas"></canvas></div>
    <div id="trash-bin" title="오브젝트를 여기로 끌어다 놓으면 삭제">🗑️</div>
</div>

<div id="chat-panel">
    <div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold; color:var(--accent);">💬 STATION 채팅</div>
    <div id="chat-msgs"></div>
    <div id="chat-input-area">
        <input type="text" id="chatInput" placeholder="메시지 입력..." style="width:100%; padding:8px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; box-sizing:border-box;">
        <button type="button" onclick="document.getElementById('chatFile').click()" style="width:100%; margin-top:6px; background:#059669; border:none; padding:8px; color:white; cursor:pointer; border-radius:6px;">📁 사진 전송</button>
        <input type="file" id="chatFile" accept="image/*" style="display:none">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, set, remove, onValue, update, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAA8DZ5jJITzGWRPK9YtpSkp8X-i38ZzcE",
        authDomain: "memo-15f70.firebaseapp.com",
        projectId: "memo-15f70",
        databaseURL: "https://memo-15f70-default-rtdb.firebaseio.com/",
        appId: "1:159916629790:web:738e7bdfef3a7b7c1d330f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let sessionEpochSeen = null;
    let metaEpochReady = false;
    /** 전체 초기화 실행 중에는 본인 클라이언트가 epoch만 보고 먼저 리로드되지 않도록 */
    let suppressEpochReload = false;
    onValue(metaEpochRef, snap => {
        const v = snap.val();
        if (v == null) {
            metaEpochReady = true;
            return;
        }
        if (!metaEpochReady) {
            metaEpochReady = true;
            sessionEpochSeen = v;
            return;
        }
        if (v !== sessionEpochSeen) {
            if (suppressEpochReload) {
                sessionEpochSeen = v;
                return;
            }
            location.reload();
        }
    });

    const drawRef = ref(db, 'drawing');
    const objRef = ref(db, 'objects');
    const chatRef = ref(db, 'chats');
    const shiriRef = ref(db, 'shiri');
    const presenceRoot = ref(db, 'presence');
    const metaEpochRef = ref(db, 'meta/sessionEpoch');

    const RESET_PASSWORD = '6974';
    const RESET_PATHS = ['drawing', 'objects', 'chats', 'shiri', 'presence'];

    let userName = "손님";
    let camX = 0, camY = 0, isDrawing = false, currentTool = 'pen';
    /** @type {string[]} 한 번의 마우스 다운~업 사이에 그린 세그먼트 키 */
    let currentStrokeKeys = [];
    /** @type {string[][]} 내가 그린 획 단위(되돌리기용) */
    let myStrokeStack = [];
    let gridVisible = true;
    let presenceRef = null;

    const viewport = document.getElementById('viewport');
    const board = document.getElementById('board');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 10000;
    canvas.height = 10000;

    const drawingCache = new Map();

    document.getElementById('lineWidth')?.addEventListener('input', function () {
        const el = document.getElementById('lineWidthVal');
        if (el) el.textContent = this.value;
    });

    function getStrokeWidth() {
        const el = document.getElementById('lineWidth');
        return Math.max(2, Math.min(80, parseInt(el?.value, 10) || 6));
    }

    function effectiveWidthForTool(tool) {
        const base = getStrokeWidth();
        if (tool === 'brush') return Math.round(base * 1.75);
        if (tool === 'marker') return Math.round(base * 1.35);
        if (tool === 'eraser') return Math.round(base * 1.5);
        return base;
    }

    function drawSegment(d) {
        ctx.save();
        const isEraser = d.er === 1 || d.er === true;
        const w = typeof d.w === 'number' && d.w > 0 ? d.w : (isEraser ? 24 : 4);
        if (isEraser) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.lineWidth = w;
            ctx.globalAlpha = 1;
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = d.color || '#38bdf8';
            ctx.globalAlpha = d.tool === 'marker' ? 0.38 : 1;
            ctx.lineWidth = w;
        }
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(d.x1, d.y1);
        ctx.lineTo(d.x2, d.y2);
        ctx.stroke();
        ctx.restore();
    }

    let redrawScheduled = false;
    function redrawCanvasFromCache() {
        if (redrawScheduled) return;
        redrawScheduled = true;
        requestAnimationFrame(() => {
            redrawScheduled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const d of drawingCache.values()) drawSegment(d);
        });
    }

    function escapeHtml(s) {
        if (s == null) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    function patchObj(id, data) {
        return update(ref(db, `objects/${id}`), data);
    }

    function isInteractiveTarget(t) {
        const tag = t.tagName;
        return tag === 'TEXTAREA' || tag === 'BUTTON' || tag === 'INPUT' || tag === 'SELECT' || tag === 'A' || tag === 'LABEL' || t.closest?.('iframe');
    }

    // --- 입장 · 접속 ---
    window.enterStation = () => {
        const input = document.getElementById('nickname-input');
        const name = input.value.trim();
        if (!name) return alert("이름을 입력해주세요!");
        userName = name.slice(0, 40);
        document.getElementById('login-overlay').style.display = 'none';
        push(chatRef, { type: 'text', user: '시스템', msg: `${userName}님이 입장하셨습니다.` });
        const key = userName.replace(/[.#$\[\]]/g, '_');
        presenceRef = ref(db, `presence/${key}`);
        set(presenceRef, { name: userName, t: Date.now() });
        onDisconnect(presenceRef).remove();
    };

    onValue(presenceRoot, s => {
        const n = s.exists() ? Object.keys(s.val()).length : 0;
        const el = document.getElementById('presence-badge');
        if (el) el.textContent = `접속: ${n}명`;
    });

    window.showPresenceCount = () => {
        get(presenceRoot).then(s => {
            const n = s.exists() ? Object.keys(s.val()).length : 0;
            alert(`현재 접속자 수: ${n}명`);
        });
    };

    // --- 테마 · 격자 ---
    function applyTheme(light) {
        document.body.classList.toggle('theme-light', light);
        localStorage.setItem('station-theme', light ? 'light' : 'dark');
    }
    window.toggleTheme = () => {
        applyTheme(!document.body.classList.contains('theme-light'));
    };
    if (localStorage.getItem('station-theme') === 'light') applyTheme(true);

    window.toggleGrid = () => {
        gridVisible = !gridVisible;
        board.classList.toggle('grid-off', !gridVisible);
    };

    // --- 무한 이동 ---
    viewport.oncontextmenu = e => e.preventDefault();
    viewport.addEventListener('mousedown', e => {
        if (e.button === 2 || currentTool === 'move') {
            const sx = e.clientX - camX, sy = e.clientY - camY;
            const move = m => { camX = m.clientX - sx; camY = m.clientY - sy; updateView(); };
            const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
        }
    });

    function updateView() {
        board.style.transform = `translate(${camX}px, ${camY}px)`;
        board.style.backgroundPosition = `${camX}px ${camY}px`;
    }

    // --- 드로잉 (펜·붓·마커·부분 지우개 + 획 단위 되돌리기) ---
    viewport.addEventListener('mousedown', e => {
        if (e.button !== 0 || currentTool === 'move') return;
        isDrawing = true;
        currentStrokeKeys = [];
        const r = viewport.getBoundingClientRect();
        let lx = e.clientX - r.left - camX, ly = e.clientY - r.top - camY;
        const tool = currentTool;
        const move = m => {
            if (!isDrawing) return;
            const cx = m.clientX - r.left - camX, cy = m.clientY - r.top - camY;
            const w = effectiveWidthForTool(tool);
            const isEraser = tool === 'eraser';
            const payload = {
                x1: lx, y1: ly, x2: cx, y2: cy,
                color: document.getElementById('colorPicker').value,
                w,
                tool: isEraser ? 'eraser' : tool,
                er: isEraser ? 1 : 0
            };
            const line = push(drawRef, payload);
            currentStrokeKeys.push(line.key);
            lx = cx; ly = cy;
        };
        const up = () => {
            isDrawing = false;
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
            if (currentStrokeKeys.length) myStrokeStack.push([...currentStrokeKeys]);
            currentStrokeKeys = [];
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    });

    onChildAdded(drawRef, s => {
        const d = s.val();
        drawingCache.set(s.key, d);
        drawSegment(d);
    });
    onChildRemoved(drawRef, s => {
        drawingCache.delete(s.key);
        redrawCanvasFromCache();
    });

    // --- 채팅 ---
    window.sendChat = () => {
        const i = document.getElementById('chatInput');
        if (i.value.trim()) {
            push(chatRef, { type: 'text', user: userName, msg: i.value.trim() });
            i.value = '';
        }
    };
    document.getElementById('chatInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendChat();
    });
    document.getElementById('nickname-input')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') enterStation();
    });
    document.getElementById('wordIn')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') playShiri();
    });

    document.getElementById('chatFile').addEventListener('change', function () {

    function makeDraggable(el, id) {
        el.addEventListener('mousedown', e => {
            if (isInteractiveTarget(e.target)) return;
            const trash = document.getElementById('trash-bin');
            const ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
            el.classList.add('obj-dragging');
            const move = m => {
                const nx = m.clientX - ox, ny = m.clientY - oy;
                el.style.left = nx + 'px';
                el.style.top = ny + 'px';
                patchObj(id, { x: nx, y: ny });
                if (trash) {
                    const er = el.getBoundingClientRect();
                    const tr = trash.getBoundingClientRect();
                    const cx = (er.left + er.right) / 2, cy = (er.top + er.bottom) / 2;
                    const over = cx >= tr.left && cx <= tr.right && cy >= tr.top && cy <= tr.bottom;
                    trash.classList.toggle('trash-hover', over);
                }
            };
            const up = () => {
                el.classList.remove('obj-dragging');
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
                if (trash) {
                    const er = el.getBoundingClientRect();
                    const tr = trash.getBoundingClientRect();
                    const cx = (er.left + er.right) / 2, cy = (er.top + er.bottom) / 2;
                    const over = cx >= tr.left && cx <= tr.right && cy >= tr.top && cy <= tr.bottom;
                    trash.classList.remove('trash-hover');
                    if (over) remove(ref(db, `objects/${id}`));
                }
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        });
    }

            el.querySelector('[data-n]').addEventListener('click', () => {
                const q = s.value.trim();
                if (q) window.open('https://search.naver.com/search.naver?query=' + encodeURIComponent(q), '_blank');
            });
            return;
        }

        if (d.type === 'youtube') {
            el.className += ' obj-obj-youtube';
            function embedUrl(url) {
                const m = url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
                return m ? `https://www.youtube.com/embed/${m[1]}` : '';
            }
            el.innerHTML = `<div class="obj-type">📺 YouTube</div>
                <input type="url" data-u value="${escapeHtml(d.content || '')}" placeholder="YouTube URL">
                <button type="button" data-go style="width:100%;margin-top:4px;">적용</button>
                <div data-fr></div>`;
            const u = el.querySelector('[data-u]');
            u.addEventListener('change', () => patchObj(id, { content: u.value }));
            const apply = () => {
                const src = embedUrl(u.value.trim());
                const fr = el.querySelector('[data-fr]');
                fr.innerHTML = src ? `<iframe src="${src}" allowfullscreen></iframe>` : '<small>URL을 확인하세요</small>';
            };
            el.querySelector('[data-go]').addEventListener('click', apply);
            apply();
            return;
        }

        if (d.type === 'music') {
            el.className += ' obj-obj-youtube';
            function embedUrl(url) {
                const m = url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
                return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=0` : '';
            }
            el.innerHTML = `<div class="obj-type">🎵 배경음 (YouTube)</div>
                <input type="url" data-u value="${escapeHtml(d.content || '')}">
                <div class="row"><button type="button" data-play>재생</button><button type="button" data-stop>정지</button></div>
                <div data-fr style="margin-top:6px;"></div>`;
            const u = el.querySelector('[data-u]');
            u.addEventListener('change', () => patchObj(id, { content: u.value }));
            let iframe = null;
            el.querySelector('[data-play]').addEventListener('click', () => {
                const m = u.value.trim().match(/(?:v=|youtu\.be\/)([\w-]{11})/);
                const fr = el.querySelector('[data-fr]');
                if (!m) { fr.innerHTML = '<small>유효한 URL</small>'; return; }
                fr.innerHTML = `<iframe src="https://www.youtube.com/embed/${m[1]}?autoplay=1" allow="autoplay"></iframe>`;
            });
            el.querySelector('[data-stop]').addEventListener('click', () => {
                el.querySelector('[data-fr]').innerHTML = '';
            });
            return;
        }

        if (d.type === 'feedback') {
            el.innerHTML = `<div class="obj-type">💬 피드백</div>
                <textarea data-f>${escapeHtml(d.content || '')}</textarea>
                <button type="button" data-send style="width:100%;margin-top:6px;background:#059669;">채팅으로 전송</button>`;
            const ta = el.querySelector('[data-f]');
            ta.textContent = d.content || '';
            syncTextarea(ta);
            el.querySelector('[data-send]').addEventListener('click', () => {
                const msg = ta.value.trim();
                if (!msg) return;
                push(chatRef, { type: 'text', user: `피드백(${userName})`, msg });
                alert('채팅에 전송했습니다.');
            });
            return;
        }

        if (d.type === 'table') {
            let model;
            try { model = JSON.parse(d.content || '{}'); } catch (_) { model = { rows: 3, cols: 3, cells: [] }; }
            if (!model.cells) model.cells = [];
            const rows = model.rows || 3, cols = model.cols || 3;
            const idx = (r, c) => r * cols + c;

            function build() {
                let html = `<div class="obj-type">📊 표</div><div class="row" style="margin-bottom:4px;">
                    <button type="button" data-ar>행+</button><button type="button" data-ac>열+</button></div>
                    <table style="width:100%;border-collapse:collapse;font-size:11px;">`;
                for (let r = 0; r < rows; r++) {
                    html += '<tr>';
                    for (let c = 0; c < cols; c++) {
                        const v = model.cells[idx(r, c)] ?? '';
                        html += `<td style="border:1px solid #999;padding:2px;"><input type="text" data-r="${r}" data-c="${c}" value="${escapeHtml(v)}" style="width:100%;box-sizing:border-box;"></td>`;
                    }
                    html += '</tr>';
                }
                html += '</table>';
                el.innerHTML = html;
                el.querySelectorAll('input[data-r]').forEach(inp => {
                    inp.addEventListener('change', () => {
                        const r = +inp.getAttribute('data-r'), c = +inp.getAttribute('data-c');
                        const i = idx(r, c);
                        while (model.cells.length <= i) model.cells.push('');
                        model.cells[i] = inp.value;
                        patchObj(id, { content: JSON.stringify({ rows, cols, cells: model.cells }) });
                    });
                });
                el.querySelector('[data-ar]')?.addEventListener('click', () => {
                    model.rows = rows + 1;
                    const needed = model.rows * model.cols;
                    while (model.cells.length < needed) model.cells.push('');
                    patchObj(id, { content: JSON.stringify(model) });
                    Object.assign(d, { content: JSON.stringify(model) });
                    renderObject(el, d, id);
                });
                el.querySelector('[data-ac]')?.addEventListener('click', () => {
                    const newCols = cols + 1;
                    const nc = [];
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < newCols; c++) {
                            if (c < cols) nc.push(model.cells[idx(r, c)] ?? '');
                            else nc.push('');
                        }
                    }
                    model = { rows, cols: newCols, cells: nc };
                    patchObj(id, { content: JSON.stringify(model) });
                    Object.assign(d, { content: JSON.stringify(model) });
                    renderObject(el, d, id);
                });
            }
            build();
            return;
        }

        if (d.type === 'todo') {
            const items = (d.content || '').split('\n').filter(s => s.length);
            const lines = items.length ? items : ['할 일 1', '할 일 2'];
            el.innerHTML = `<div class="obj-type">✅ 할 일</div><div data-list></div>
                <button type="button" data-add style="width:100%;margin-top:6px;">항목 추가</button>`;
            const list = el.querySelector('[data-list]');
            function drawList() {
                list.innerHTML = lines.map((line, i) => {
                    const done = d.v1 & (1 << i);
                    return `<div style="display:flex;align-items:center;gap:4px;margin:2px 0;">
                        <input type="checkbox" data-i="${i}" ${done ? 'checked' : ''}>
                        <input type="text" data-t="${i}" value="${escapeHtml(line)}" style="flex:1;">
                    </div>`;
                }).join('');
                list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    cb.addEventListener('change', () => {
                        const i = +cb.getAttribute('data-i');
                        let mask = d.v1 || 0;
                        if (cb.checked) mask |= (1 << i); else mask &= ~(1 << i);
                        d.v1 = mask;
                        patchObj(id, { v1: mask });
                    });
                });
                list.querySelectorAll('input[data-t]').forEach(inp => {
                    inp.addEventListener('change', () => {
                        const i = +inp.getAttribute('data-t');
                        lines[i] = inp.value;
                        patchObj(id, { content: lines.join('\n') });
                    });
                });
            }
            drawList();
            el.querySelector('[data-add]').addEventListener('click', () => {
                lines.push('새 할 일');
                patchObj(id, { content: lines.join('\n') });
                d.content = lines.join('\n');
                renderObject(el, d, id);
            });
            return;
        }

        if (d.type === 'link') {
            el.innerHTML = `<div class="obj-type">🔗 링크</div>
                <input type="url" data-u value="${escapeHtml(d.content || 'https://')}">
                <button type="button" data-o style="width:100%;margin-top:6px;">새 탭에서 열기</button>`;
            const u = el.querySelector('[data-u]');
            u.addEventListener('change', () => patchObj(id, { content: u.value }));
            el.querySelector('[data-o]').addEventListener('click', () => {
                let url = u.value.trim();
                if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
                window.open(url, '_blank');
            });
            return;
        }

        if (d.type === 'notice') {
            el.innerHTML = `<div class="obj-type">📢 공지</div>
                <textarea data-ta style="min-height:100px;font-weight:600;">${escapeHtml(d.content || '')}</textarea>`;
            const ta = el.querySelector('[data-ta]');
            ta.textContent = d.content || '';
            syncTextarea(ta);
            return;
        }

        if (d.type === 'mindmap') {
            el.innerHTML = `<div class="obj-type">🧠 마인드맵 (들여쓰기)</div>
                <small>들여쓰기로 계층 표현</small>
                <textarea data-ta style="min-height:120px;font-family:monospace;">${escapeHtml(d.content || '')}</textarea>`;
            const ta = el.querySelector('[data-ta]');
            ta.textContent = d.content || '';
            syncTextarea(ta);
            return;
        }

        if (d.type === 'calendar') {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            const firstWeekday = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            let html = `<div class="obj-type">📅 ${y}년 ${m + 1}월</div>
                <table style="width:100%;font-size:10px;text-align:center;border-collapse:collapse;">`;
            const wk = ['일', '월', '화', '수', '목', '금', '토'];
            html += '<tr>' + wk.map(x => `<th style="border:1px solid #999;padding:2px;">${x}</th>`).join('') + '</tr>';
            let day = 1;
            for (let r = 0; r < 6 && day <= daysInMonth; r++) {
                html += '<tr>';
                for (let c = 0; c < 7; c++) {
                    if ((r === 0 && c < firstWeekday) || day > daysInMonth) html += '<td style="border:1px solid #eee;"></td>';
                    else html += `<td style="border:1px solid #ccc;padding:2px;">${day++}</td>`;
                }
                html += '</tr>';
            }
            html += '</table><small style="display:block;margin-top:4px;">이 기기 로컬 날짜 기준</small>';
            el.innerHTML = html;
            return;
        }

        if (d.type === 'kanban') {
            let k;
            try { k = JSON.parse(d.content || '{}'); } catch (_) { k = { todo: [], doing: [], done: [] }; }
            ['todo', 'doing', 'done'].forEach(key => { if (!Array.isArray(k[key])) k[key] = []; });

            function renderK() {
                const titles = { todo: '📝 할 일', doing: '🔄 진행', done: '✅ 완료' };
                el.innerHTML = `<div class="obj-type">📋 칸반</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:10px;">
                    ${['todo', 'doing', 'done'].map(key => `
                        <div style="background:rgba(0,0,0,0.06);border-radius:6px;padding:4px;">
                            <b>${titles[key]}</b>
                            <div data-col="${key}"></div>
                            <button type="button" data-add="${key}" style="width:100%;margin-top:4px;font-size:10px;">+</button>
                        </div>`).join('')}
                    </div>`;
                ['todo', 'doing', 'done'].forEach(key => {
                    const col = el.querySelector(`[data-col="${key}"]`);
                    k[key].forEach((text, i) => {
                        const wrap = document.createElement('div');
                        wrap.style.cssText = 'display:flex;gap:2px;margin:2px 0;align-items:center;';
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.value = text;
                        inp.style.flex = '1';
                        inp.style.fontSize = '10px';
                        inp.addEventListener('change', () => {
                            k[key][i] = inp.value;
                            patchObj(id, { content: JSON.stringify(k) });
                        });
                        const del = document.createElement('button');
                        del.type = 'button';
                        del.textContent = '×';
                        del.style.padding = '0 4px';
                        del.addEventListener('click', () => {
                            k[key].splice(i, 1);
                            patchObj(id, { content: JSON.stringify(k) });
                            renderK();
                        });
                        wrap.appendChild(inp);
                        wrap.appendChild(del);
                        col.appendChild(wrap);
                    });
                    el.querySelector(`[data-add="${key}"]`).addEventListener('click', () => {
                        k[key].push('새 카드');
                        patchObj(id, { content: JSON.stringify(k) });
                        renderK();
                    });
                });
            }
            renderK();
            return;
        }

        /* note, text — 기본 메모 */
        const labels = { note: '📋 포스트잇', text: '🔤 텍스트' };
        const title = labels[d.type] || d.type;
        el.innerHTML = `<div class="obj-type">${title}</div><textarea data-ta></textarea>`;
        const ta = el.querySelector('[data-ta]');
        ta.textContent = d.content || '';
        if (d.type === 'text') ta.style.minHeight = '120px';
        syncTextarea(ta);
    }

    onChildAdded(objRef, snap => {
        const d = snap.val(), id = snap.key;
        const el = document.createElement('div');
        renderObject(el, d, id);
        board.appendChild(el);
        makeDraggable(el, id);

        onValue(ref(db, `objects/${id}`), s => {
            if (!s.exists()) {
                if (el._clockIv) { clearInterval(el._clockIv); el._clockIv = null; }
                if (typeof el._firebaseUnsub === 'function') { el._firebaseUnsub(); el._firebaseUnsub = null; }
                if (typeof el._timerContentUnsub === 'function') { el._timerContentUnsub(); el._timerContentUnsub = null; }
                el.remove();
                return;
            }
            const nd = s.val();
            if (nd.x != null) el.style.left = nd.x + 'px';
            if (nd.y != null) el.style.top = nd.y + 'px';
        });
    });

    window.vote = async (id, n) => {
        const r = ref(db, `objects/${id}`);
        const snap = await get(r);
        const data = snap.val();
        if (!data) return;
        if (n === 1) await update(r, { v1: (data.v1 || 0) + 1 });
        else await update(r, { v2: (data.v2 || 0) + 1 });
    };

    window.playRSP = c => {
        push(chatRef, { type: 'text', user: '게임', msg: `${userName}님이 ${c}를 냈습니다!` });
    };

    window.playShiri = () => {
        const i = document.getElementById('wordIn');
        const n = i.value.trim();
        if (!n) return;
        get(shiriRef).then(s => {
            const l = s.val() || '';
            if (l && l.slice(-1) !== n.charAt(0)) { alert('땡!'); return; }
            set(shiriRef, n);
            push(chatRef, { type: 'text', user: '게임', msg: `끝말잇기: ${n}` });
            i.value = '';
        });
    };
    onValue(shiriRef, s => {
        document.getElementById('shiri-val').innerText = '현재: ' + (s.val() || '없음');
    });

    window.setTool = t => {
        currentTool = t;
        ['pen', 'brush', 'marker', 'eraser', 'move'].forEach(x => {
            const b = document.getElementById('btn-' + x);
            if (b) b.classList.toggle('active', x === t);
        });
    };

    window.undoStroke = () => {
        const keys = myStrokeStack.pop();
        if (!keys?.length) return;
        keys.forEach(k => remove(ref(db, `drawing/${k}`)));
    };
    window.undo = window.undoStroke;

    document.addEventListener('keydown', e => {
        if (!e.ctrlKey && !e.metaKey) return;
        if (e.key !== 'z' && e.key !== 'Z') return;
        const t = e.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
        e.preventDefault();
        undoStroke();
    });

    window.saveBoard = () => {
        const a = document.createElement('a');
        a.download = 'station.png';
        a.href = canvas.toDataURL();
        a.click();
    };

    window.resetAll = async () => {
        const pw = prompt('전체 초기화 비밀번호를 입력하세요:');
        if (pw !== RESET_PASSWORD) {
            alert('비밀번호가 올바르지 않습니다.');
            return;
        }
        if (!confirm('모든 그림·오브젝트·채팅·게임 기록이 삭제됩니다. 접속 중인 모두 화면이 갱신됩니다. 계속할까요?')) return;
        try {
            const epoch = Date.now();
            suppressEpochReload = true;
            await set(metaEpochRef, epoch);
            await Promise.all(RESET_PATHS.map(p => remove(ref(db, p))));
            suppressEpochReload = false;
            location.reload();
        } catch (e) {
            suppressEpochReload = false;
            alert('초기화 중 오류가 났습니다. 권한을 확인하세요.');
        }
    };
</script>
</body>
</html>
