<!DOCTYPE html>
<html>
<head>
    <title>STATION v8 - 40 TOOLS ULTRA</title>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --border: #334155; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 📜 왼쪽 사이드바 (스크롤 가능) */
        #sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #sidebar-content { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        #sidebar h2 { color: var(--accent); text-align: center; margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        .tool-group { background: rgba(15, 23, 42, 0.5); border-radius: 8px; padding: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .tool-group strong { font-size: 13px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        
        button { padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #334155; color: white; font-size: 11px; transition: 0.2s; }
        button:hover { background: #475569; }
        button.active { background: var(--accent); color: #000; }
        
        /* 캔버스 영역 */
        #viewport { flex-grow: 1; position: relative; overflow: hidden; background: #0f172a; }
        #board { position: absolute; top: 0; left: 0; width: 5000px; height: 5000px; transform-origin: 0 0; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 오브젝트들 */
        .obj { position: absolute; padding: 12px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: move; z-index: 10; background: #fef08a; color: #1c1917; min-width: 150px; }
        .poll-box { background: white !important; border: 2px solid var(--accent); }
        .rsp-box { background: #e2e8f0 !important; text-align: center; }

        /* 💬 오른쪽 채팅방 */
        #chat-panel { width: 320px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #334155; padding: 10px; border-radius: 12px; align-self: flex-start; max-width: 85%; font-size: 13px; word-break: break-all; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; display: block; }
        #chat-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-content">
        <h2>STATION v8</h2>
        
        <div class="tool-group">
            <strong>🖌️ Drawing & Basic (1-8)</strong>
            <div class="grid-2">
                <button onclick="setTool('pen')" id="btn-pen" class="active">1. ✏️ 펜</button>
                <button onclick="setTool('eraser')" id="btn-eraser">2. 🧹 지우개</button>
                <button onclick="setTool('move')" id="btn-move">3. 🖱️ 이동</button>
                <button onclick="undo()">4. ↩️ 되돌리기</button>
                <button onclick="createObj('note')">5. 📋 포스트잇</button>
                <button onclick="createObj('text')">6. 🔤 텍스트</button>
                <button onclick="toggleGrid()">7. 🏁 격자 켜기</button>
                <button onclick="saveCanvas()">8. 💾 화면 저장</button>
            </div>
            <input type="color" id="colorPicker" value="#38bdf8" style="width:100%;">
        </div>

        <div class="tool-group">
            <strong>📝 Collaboration (9-16)</strong>
            <div class="grid-2">
                <button onclick="createObj('code')">9. 💻 코드박스</button>
                <button onclick="createObj('table')">10. 📊 실시간 표</button>
                <button onclick="createObj('todo')">11. ✅ 할일목록</button>
                <button onclick="createObj('link')">12. 🔗 링크공유</button>
                <button onclick="createObj('notice')">13. 📢 공지사항</button>
                <button onclick="createObj('mindmap')">14. 🧠 마인드맵</button>
                <button onclick="createObj('calendar')">15. 📅 캘린더</button>
                <button onclick="createObj('kanban')">16. 📋 칸반보드</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🎮 Game & Random (17-24)</strong>
            <div id="shiritori-val" style="font-size:11px; color:var(--accent);">끝말잇기 대기...</div>
            <input type="text" id="wordInput" placeholder="17. 끝말잇기" onkeypress="if(event.keyCode==13) runShiritori()">
            <div class="grid-2">
                <button onclick="createObj('poll')">18. 🗳️ 투표 시작</button>
                <button onclick="createObj('rsp')">19. ✌️ 가위바위보</button>
                <button onclick="createObj('dice')">20. 🎲 주사위</button>
                <button onclick="createObj('randomName')">21. 👤 이름추첨</button>
                <button onclick="createObj('coin')">22. 🪙 동전던지기</button>
                <button onclick="createObj('ladder')">23. 🪜 사다리타기</button>
                <button onclick="createObj('bomb')">24. 💣 폭탄돌리기</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🚀 Utility (25-32)</strong>
            <div class="grid-2">
                <button onclick="createObj('timer')">25. ⏳ 타이머</button>
                <button onclick="createObj('clock')">26. ⏰ 세계시각</button>
                <button onclick="createObj('calc')">27. 🧮 계산기</button>
                <button onclick="createObj('weather')">28. ☁️ 날씨정보</button>
                <button onclick="createObj('colorPalette')">29. 🎨 색상표</button>
                <button onclick="createObj('translate')">30. 🌐 번역기</button>
                <button onclick="createObj('qr')">31. 📱 QR생성</button>
                <button onclick="createObj('search')">32. 🔍 검색창</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>⚙️ System & Media (33-40)</strong>
            <div class="grid-2">
                <button onclick="document.getElementById('chatFile').click()">33. 📁 파일 전송</button>
                <button onclick="createObj('youtube')">34. 📺 유튜브</button>
                <button onclick="createObj('music')">35. 🎵 배경음악</button>
                <button onclick="alert('접속자: '+userCount)">36. 👥 접속자수</button>
                <button onclick="location.reload()">37. 🔄 새로고침</button>
                <button onclick="createObj('feedback')">38. 💬 피드백</button>
                <button onclick="changeTheme()">39. 🌙 테마변경</button>
                <button onclick="resetAll()" style="background:#ef4444">40. 💣 전체초기화</button>
            </div>
        </div>
    </div>
</div>

<div id="viewport"><div id="board"><canvas id="canvas"></canvas></div></div>

<div id="chat-panel">
    <div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold; color:var(--accent);">💬 STATION 채팅</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chatInput" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendChat()">
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button onclick="sendChat()" style="flex:1; background:var(--accent); color:#000;">전송</button>
            <button onclick="document.getElementById('chatFile').click()" style="background:#10b981;">📁 사진</button>
        </div>
        <input type="file" id="chatFile" accept="image/*" style="display:none" onchange="handleChatFile(this.files)">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAA8DZ5jJITzGWRPK9YtpSkp8X-i38ZzcE",
        authDomain: "memo-15f70.firebaseapp.com",
        projectId: "memo-15f70",
        databaseURL: "https://memo-15f70-default-rtdb.firebaseio.com/",
        appId: "1:159916629790:web:738e7bdfef3a7b7c1d330f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const drawRef = ref(db, 'drawing');
    const objRef = ref(db, 'objects');
    const chatRef = ref(db, 'chats');
    const wordRef = ref(db, 'gameWord');

    const board = document.getElementById('board');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 5000; canvas.height = 5000;

    let posX = 0, posY = 0, isDrawing = false, currentTool = 'pen';
    let lastX = 0, lastY = 0, myHistory = [];

    // --- [드로잉 & 툴] ---
    window.setTool = (t) => { currentTool = t; document.querySelectorAll('button').forEach(b=>b.classList.remove('active')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); };
    canvas.onmousedown = (e) => { if(currentTool!=='move') { isDrawing=true; [lastX,lastY]=[e.offsetX,e.offsetY]; } };
    canvas.onmousemove = (e) => {
        if(!isDrawing || currentTool==='move') return;
        const color = currentTool==='eraser' ? '#0f172a' : document.getElementById('colorPicker').value;
        const line = push(drawRef, { x1:lastX, y1:lastY, x2:e.offsetX, y2:e.offsetY, color, size:3 });
        myHistory.push(line.key);
        draw(lastX, lastY, e.offsetX, e.offsetY, color, 3);
        [lastX,lastY] = [e.offsetX,e.offsetY];
    };
    canvas.onmouseup = () => isDrawing=false;
    function draw(x1,y1,x2,y2,c,s) { ctx.strokeStyle=c; ctx.lineWidth=s; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    onChildAdded(drawRef, s => { const d=s.val(); draw(d.x1,d.y1,d.x2,d.y2,d.color,d.size); });

    // --- [채팅 & 사진 (보완 완료)] ---
    window.sendChat = () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        push(chatRef, { type:'text', msg: input.value });
        input.value = "";
    };
    window.handleChatFile = (files) => {
        const r = new FileReader();
        r.onload = e => push(chatRef, { type:'img', msg: e.target.result });
        r.readAsDataURL(files[0]);
    };
    onChildAdded(chatRef, s => {
        const d = s.val();
        const div = document.createElement('div');
        div.className = 'msg';
        if(d.type === 'text') div.innerText = d.msg;
        else div.innerHTML = `<img src="${d.msg}" onclick="window.open(this.src)">`;
        const c = document.getElementById('chat-messages');
        c.appendChild(div); c.scrollTop = c.scrollHeight;
    });

    // --- [오브젝트 & 투표/가위바위보 시스템] ---
    window.createObj = (type) => push(objRef, { type, x:-posX+200, y:-posY+200, content: '', v1:0, v2:0 });

    onChildAdded(objRef, (snap) => {
        const d=snap.val(), id=snap.key;
        const el=document.createElement('div'); el.className=`obj ${d.type}`;
        el.style.left=d.x+'px'; el.style.top=d.y+'px';
        
        if(d.type==='poll') {
            el.className += " poll-box";
            el.innerHTML = `<strong>🗳️ 투표</strong><br><input placeholder="주제" value="${d.content}" onchange="update(ref(db,'objects/${id}'),{content:this.value})"><br>
                            <button onclick="vote('${id}',1)">찬성: ${d.v1}</button> <button onclick="vote('${id}',2)">반대: ${d.v2}</button>
                            <button onclick="remove(ref(db,'objects/${id}'))" style="background:red">종료</button>`;
        } else if(d.type==='rsp') {
            el.className += " rsp-box";
            el.innerHTML = `<strong>✌️ 가위바위보</strong><br><div id="r-${id}">준비!</div>
                            <button onclick="playRSP('${id}','✌️')">✌️</button> <button onclick="playRSP('${id}','✊')">✊</button> <button onclick="playRSP('${id}','🖐️')">🖐️</button>`;
        } else if(d.type==='dice') {
            el.innerHTML = `<button onclick="this.innerText='🎲 '+(Math.floor(Math.random()*6)+1)">🎲 주사위 굴리기</button>`;
        } else {
            el.innerHTML = `<textarea onchange="update(ref(db,'objects/${id}'),{content:this.value})">${d.content || d.type}</textarea>`;
        }

        board.appendChild(el);
        makeDraggable(el, id);
    });

    // 투표 기능 실시간 반영
    window.vote = (id, num) => {
        onValue(ref(db, `objects/${id}`), s => {
            const data = s.val();
            if(num===1) update(ref(db, `objects/${id}`), { v1: (data.v1||0)+1 });
            else update(ref(db, `objects/${id}`), { v2: (data.v2||0)+1 });
        }, {onlyOnce:true});
    };

    // 가위바위보 실시간 (로그로 전송)
    window.playRSP = (id, choice) => {
        document.getElementById(`r-${id}`).innerText = "내가 낸 것: " + choice;
        push(chatRef, { type:'text', msg: `🎮 가위바위보 결과: 누군가 ${choice}를 냈습니다!` });
    };

    function makeDraggable(el, id) {
        el.onmousedown = (e) => {
            if(e.target.tagName==='TEXTAREA' || e.target.tagName==='BUTTON' || e.target.tagName==='INPUT') return;
            let ox=e.clientX-el.offsetLeft, oy=e.clientY-el.offsetTop;
            document.onmousemove=(m)=>{
                let nx=m.clientX-ox, ny=m.clientY-oy; el.style.left=nx+'px'; el.style.top=ny+'px';
                update(ref(db,`objects/${id}`), {x:nx, y:ny});
            };
            document.onmouseup=()=>document.onmousemove=null;
        };
    }

    // 기타 시스템
    window.undo = () => { const id=myHistory.pop(); if(id) remove(ref(db, `drawing/${id}`)); };
    window.saveCanvas = () => { const link = document.createElement('a'); link.download = 'station_board.png'; link.href = canvas.toDataURL(); link.click(); };
    window.toggleGrid = () => { board.style.background = board.style.background ? '' : 'radial-gradient(#334155 1px, transparent 1px) 0 0 / 40px 40px'; };
    window.resetAll = () => { if(confirm("초기화?")) { remove(ref(db)); location.reload(); } };
    
    // 화면 이동 (우클릭)
    viewport.oncontextmenu = e => e.preventDefault();
    viewport.onmousedown = e => { if(e.button===2 || currentTool==='move') { let sX=e.clientX-posX, sY=e.clientY-posY; document.onmousemove=m=>{ posX=m.clientX-sX; posY=m.clientY-sY; board.style.transform=`translate(${posX}px,${posY}px)`; }; } };
    window.addEventListener('mouseup', ()=>document.onmousemove=null);
</script>
</body>
</html>
