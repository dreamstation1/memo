<!DOCTYPE html>
<html>
<head>
    <title>STATION v11 - INFINITE & PERSONALIZED</title>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --border: #334155; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 🆔 입장 레이어 */
        #login-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 0 20px var(--accent); }
        .login-box input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }

        /* 📜 사이드바 (40개 기능 스크롤) */
        #sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .tool-group { background: rgba(15, 23, 42, 0.5); border-radius: 8px; padding: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .tool-group strong { font-size: 13px; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { padding: 8px; border: none; border-radius: 4px; cursor: pointer; background: #334155; color: white; font-size: 11px; font-weight: bold; transition: 0.2s; }
        button.active { background: var(--accent); color: #000; }

        /* 🌌 무한 캔버스 엔진 */
        #viewport { flex-grow: 1; position: relative; overflow: hidden; background: #0f172a; }
        #board { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 40px 40px; }
        #canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

        /* 📦 실시간 오브젝트 */
        .obj { position: absolute; padding: 12px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: move; z-index: 10; background: #fef08a; color: #1c1917; min-width: 150px; font-size: 13px; }
        .obj textarea { width: 100%; height: 80px; background: rgba(255,255,255,0.3); border: none; border-radius: 4px; }
        .poll-box { background: white !important; border: 2px solid var(--accent); }

        /* 💬 채팅창 */
        #chat-panel { width: 300px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #chat-msgs { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .msg { background: #334155; padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; }
        .msg b { color: var(--accent); font-size: 11px; display: block; margin-bottom: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; }
        #chat-input-area { padding: 12px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3>아지트 입장 닉네임</h3>
        <input type="text" id="nickname-input" placeholder="이름을 입력하세요" onkeypress="if(event.keyCode==13) enterStation()">
        <br>
        <button onclick="enterStation()" style="width:100%; padding:10px; background:var(--accent); color:black;">입장하기</button>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-scroll">
        <h2 style="color:var(--accent); text-align:center;">STATION v11</h2>
        <div class="tool-group">
            <strong>🖌️ Drawing (1-8)</strong>
            <div class="grid-2">
                <button onclick="setTool('pen')" id="btn-pen" class="active">1. ✏️ 펜</button>
                <button onclick="setTool('eraser')" id="btn-eraser">2. 🧹 지우개</button>
                <button onclick="setTool('move')" id="btn-move">3. 🖱️ 이동</button>
                <button onclick="undo()">4. ↩️ 되돌리기</button>
                <button onclick="createObj('note')">5. 📋 포스트잇</button>
                <button onclick="createObj('text')">6. 🔤 텍스트</button>
                <button onclick="toggleGrid()">7. 🏁 격자 켜기</button>
                <button onclick="saveBoard()">8. 💾 화면 저장</button>
            </div>
            <input type="color" id="colorPicker" value="#38bdf8" style="width:100%;">
        </div>

        <div class="tool-group">
            <strong>📝 Collaboration (9-16)</strong>
            <div class="grid-2">
                <button onclick="createObj('code')">9. 💻 코드박스</button>
                <button onclick="createObj('table')">10. 📊 실시간 표</button>
                <button onclick="createObj('todo')">11. ✅ 할일목록</button>
                <button onclick="createObj('link')">12. 🔗 링크공유</button>
                <button onclick="createObj('notice')">13. 📢 공지사항</button>
                <button onclick="createObj('mindmap')">14. 🧠 마인드맵</button>
                <button onclick="createObj('calendar')">15. 📅 캘린더</button>
                <button onclick="createObj('kanban')">16. 📋 칸반보드</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🎮 Game (17-24)</strong>
            <div id="shiri-val" style="font-size:11px; color:var(--accent);">현재: 없음</div>
            <input type="text" id="wordIn" placeholder="17. 끝말잇기" onkeypress="if(event.keyCode==13) playShiri()">
            <div class="grid-2">
                <button onclick="createObj('poll')">18. 🗳️ 투표 시작</button>
                <button onclick="createObj('rsp')">19. ✌️ 가위바위보</button>
                <button onclick="createObj('dice')">20. 🎲 주사위</button>
                <button onclick="createObj('name')">21. 👤 이름추첨</button>
                <button onclick="createObj('coin')">22. 🪙 동전던지기</button>
                <button onclick="createObj('ladder')">23. 🪜 사다리타기</button>
                <button onclick="createObj('bomb')">24. 💣 폭탄돌리기</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>🚀 Utility (25-32)</strong>
            <div class="grid-2">
                <button onclick="createObj('timer')">25. ⏳ 타이머</button>
                <button onclick="createObj('clock')">26. ⏰ 세계시각</button>
                <button onclick="createObj('calc')">27. 🧮 계산기</button>
                <button onclick="createObj('weather')">28. ☁️ 날씨정보</button>
                <button onclick="createObj('palette')">29. 🎨 색상표</button>
                <button onclick="createObj('trans')">30. 🌐 번역기</button>
                <button onclick="createObj('qr')">31. 📱 QR생성</button>
                <button onclick="createObj('search')">32. 🔍 검색창</button>
            </div>
        </div>

        <div class="tool-group">
            <strong>⚙️ System (33-40)</strong>
            <div class="grid-2">
                <button onclick="document.getElementById('chatFile').click()">33. 📁 파일 전송</button>
                <button onclick="createObj('youtube')">34. 📺 유튜브</button>
                <button onclick="createObj('music')">35. 🎵 배경음악</button>
                <button onclick="alert('접속중!')">36. 👥 접속자수</button>
                <button onclick="location.reload()">37. 🔄 새로고침</button>
                <button onclick="createObj('feedback')">38. 💬 피드백</button>
                <button onclick="alert('준비중')">39. 🌙 테마변경</button>
                <button onclick="resetAll()" style="background:#ef4444">40. 💣 전체초기화</button>
            </div>
        </div>
    </div>
</div>

<div id="viewport">
    <div id="board"><canvas id="canvas"></canvas></div>
</div>

<div id="chat-panel">
    <div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold; color:var(--accent);">💬 STATION 채팅</div>
    <div id="chat-msgs"></div>
    <div id="chat-input-area">
        <input type="text" id="chatInput" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendChat()" style="width:100%; padding:8px; background:#0f172a; color:white; border:none; border-radius:5px;">
        <button onclick="document.getElementById('chatFile').click()" style="width:100%; margin-top:5px; background:#10b981; border:none; padding:5px; color:white; cursor:pointer;">📁 사진 전송</button>
        <input type="file" id="chatFile" accept="image/*" style="display:none" onchange="uploadFile(this.files)">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAA8DZ5jJITzGWRPK9YtpSkp8X-i38ZzcE",
        authDomain: "memo-15f70.firebaseapp.com",
        projectId: "memo-15f70",
        databaseURL: "https://memo-15f70-default-rtdb.firebaseio.com/",
        appId: "1:159916629790:web:738e7bdfef3a7b7c1d330f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const drawRef = ref(db, 'drawing');
    const objRef = ref(db, 'objects');
    const chatRef = ref(db, 'chats');
    const shiriRef = ref(db, 'shiri');

    let userName = "손님";
    let camX = 0, camY = 0, isDrawing = false, currentTool = 'pen';
    let myHistory = [];

    const viewport = document.getElementById('viewport');
    const board = document.getElementById('board');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 10000; canvas.height = 10000;

    // --- [입장 기능] ---
    window.enterStation = () => {
        const input = document.getElementById('nickname-input');
        if(!input.value.trim()) return alert("이름을 입력해주세요!");
        userName = input.value;
        document.getElementById('login-overlay').style.display = 'none';
        push(chatRef, {type:'text', user:'시스템', msg: `${userName}님이 입장하셨습니다.`});
    };

    // --- [무한 이동 (우클릭)] ---
    viewport.oncontextmenu = e => e.preventDefault();
    viewport.onmousedown = e => {
        if(e.button === 2 || currentTool === 'move') {
            let sx = e.clientX - camX, sy = e.clientY - camY;
            window.onmousemove = m => { camX = m.clientX - sx; camY = m.clientY - sy; updateView(); };
            window.onmouseup = () => window.onmousemove = null;
        }
    };
    function updateView() { board.style.transform = `translate(${camX}px, ${camY}px)`; board.style.backgroundPosition = `${camX}px ${camY}px`; }

    // --- [드로잉] ---
    viewport.addEventListener('mousedown', e => {
        if(e.button !== 0 || currentTool === 'move') return;
        isDrawing = true;
        let r = viewport.getBoundingClientRect();
        let lx = e.clientX - r.left - camX, ly = e.clientY - r.top - camY;
        window.onmousemove = m => {
            if(!isDrawing) return;
            let cx = m.clientX - r.left - camX, cy = m.clientY - r.top - camY;
            let color = currentTool==='eraser' ? '#0f172a' : document.getElementById('colorPicker').value;
            let line = push(drawRef, {x1:lx, y1:ly, x2:cx, y2:cy, color});
            myHistory.push(line.key);
            draw(lx, ly, cx, cy, color);
            lx = cx; ly = cy;
        };
    });
    window.onmouseup = () => { isDrawing = false; window.onmousemove = null; };
    function draw(x1,y1,x2,y2,c) { ctx.strokeStyle=c; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    onChildAdded(drawRef, s => { let d=s.val(); draw(d.x1, d.y1, d.x2, d.y2, d.color); });

    // --- [채팅 (이름 포함)] ---
    window.sendChat = () => {
        let i = document.getElementById('chatInput');
        if(i.value.trim()) { push(chatRef, {type:'text', user: userName, msg: i.value}); i.value=''; }
    };
    window.uploadFile = f => {
        let r = new FileReader();
        r.onload = e => push(chatRef, {type:'img', user: userName, msg: e.target.result});
        r.readAsDataURL(f[0]);
    };
    onChildAdded(chatRef, s => {
        let d = s.val(), div = document.createElement('div'); div.className = 'msg';
        div.innerHTML = `<b>${d.user}</b>${d.type==='text'?d.msg:`<img src="${d.msg}" onclick="window.open(this.src)">`}`;
        document.getElementById('chat-msgs').appendChild(div);
        document.getElementById('chat-msgs').scrollTop = 99999;
    });

    // --- [40가지 오브젝트 로직] ---
    window.createObj = t => push(objRef, { type:t, x:-camX+200, y:-camY+200, content:'', v1:0, v2:0 });
    onChildAdded(objRef, snap => {
        let d=snap.val(), id=snap.key, el=document.createElement('div');
        el.className=`obj ${d.type}`; el.style.left=d.x+'px'; el.style.top=d.y+'px';
        
        if(d.type==='poll') {
            el.className += " poll-box";
            onValue(ref(db, `objects/${id}`), s => {
                let v = s.val(); if(!v) return;
                el.innerHTML = `<strong>🗳️ 투표: ${v.content||'주제없음'}</strong><br>
                <button onclick="vote('${id}',1)">찬성: ${v.v1||0}</button> <button onclick="vote('${id}',2)">반대: ${v.v2||0}</button>
                <button onclick="remove(ref(db,'objects/${id}'))" style="background:red; color:white;">종료</button>`;
            });
        } else if(d.type==='rsp') {
            el.innerHTML = `<strong>✌️ 가위바위보</strong><br><button onclick="playRSP('✌️')">✌️</button><button onclick="playRSP('✊')">✊</button><button onclick="playRSP('🖐️')">🖐️</button>`;
        } else {
            el.innerHTML = `<strong>${d.type.toUpperCase()}</strong><br><textarea onchange="update(ref(db,'objects/${id}'),{content:this.value})">${d.content}</textarea>`;
        }
        board.appendChild(el);
        makeDraggable(el, id);
    });

    window.vote = (id, n) => {
        onValue(ref(db, `objects/${id}`), s => {
            let d = s.val();
            if(n===1) update(ref(db, `objects/${id}`), {v1: (d.v1||0)+1});
            else update(ref(db, `objects/${id}`), {v2: (d.v2||0)+1});
        }, {onlyOnce: true});
    };
    window.playRSP = (c) => push(chatRef, {type:'text', user:'게임', msg:`${userName}님이 ${c}를 냈습니다!`});
    window.playShiri = () => {
        let i=document.getElementById('wordIn'), n=i.value.trim();
        onValue(shiriRef, s => {
            let l=s.val()||"";
            if(l && l.slice(-1) !== n.charAt(0)) { alert("땡!"); return; }
            set(shiriRef, n); push(chatRef,{type:'text', user:'게임', msg:`끝말잇기: ${n}`}); i.value='';
        }, {onlyOnce:true});
    };
    onValue(shiriRef, s => document.getElementById('shiri-val').innerText = "현재: " + (s.val()||"없음"));

    function makeDraggable(el, id) {
        el.onmousedown = e => {
            if(e.target.tagName==='TEXTAREA' || e.target.tagName==='BUTTON' || e.target.tagName==='INPUT') return;
            let ox=e.clientX-el.offsetLeft, oy=e.clientY-el.offsetTop;
            document.onmousemove = m => {
                let nx=m.clientX-ox, ny=m.clientY-oy; el.style.left=nx+'px'; el.style.top=ny+'px';
                update(ref(db,`objects/${id}`), {x:nx, y:ny});
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    window.setTool = t => { currentTool=t; document.querySelectorAll('button').forEach(b=>b.classList.remove('active')); if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active'); };
    window.undo = () => { let id=myHistory.pop(); if(id) remove(ref(db, `drawing/${id}`)); };
    window.saveBoard = () => { let a=document.createElement('a'); a.download='station.png'; a.href=canvas.toDataURL(); a.click(); };
    window.resetAll = () => { if(confirm("초기화?")) remove(ref(db)); };
</script>
</body>
</html>
